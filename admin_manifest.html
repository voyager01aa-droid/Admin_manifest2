<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenLand Pro | Admin Dashboard</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  
  <style>
    /* APPLE VISION PRO & NEON GLASSMORPHISM CSS */
    :root {
      --brand: #00ffcc;
      --brand-dark: #00b38f;
      --bg: #040914;
      --text: #f8fafc;
      --muted: #94a3b8;
      --surface: rgba(15, 25, 40, 0.35);
      --surface-solid: rgba(15, 25, 40, 0.65);
      --glass-border: rgba(255, 255, 255, 0.15);
      --danger: #ff3366;
      --warning: #ffcc00;
      --blue: #00eeff;
      --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.6);
      --shadow-glow: 0 0 20px rgba(0, 255, 204, 0.3), inset 0 0 15px rgba(0, 255, 204, 0.1);
      --neon-border: 1px solid var(--brand);
      --radius-lg: 32px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --sidebar: 280px;
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; } 
    html { scroll-behavior: smooth; overflow-x: hidden; }
    
    body { 
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; 
      color: var(--text); background-color: var(--bg); min-height: 100vh; position: relative; 
      overflow-x: hidden;
    }
    
    body::before, body::after {
      content: ""; position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1;
      animation: floatBg 20s ease-in-out infinite alternate;
    }
    body::before { top: -10%; left: -10%; width: 400px; height: 400px; background: rgba(0, 255, 204, 0.15); }
    body::after { bottom: -10%; right: -10%; width: 500px; height: 500px; background: rgba(0, 238, 255, 0.1); animation-delay: -10s; }
    
    @keyframes floatBg { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }
    @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

    /* ICON PACK STYLING */
    i[class^="ph"] { 
      position: relative; display: inline-grid; place-items: center; width: 1.8em; height: 1.8em;
      border-radius: 35%; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px) saturate(200%);
      -webkit-backdrop-filter: blur(12px) saturate(200%); border: 1px solid rgba(255, 255, 255, 0.4);
      border-right-color: rgba(255, 255, 255, 0.05); border-bottom-color: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0.95); z-index: 1; transition: transform 0.3s ease; isolation: isolate;
    }

    i[class^="ph"]::after {
        content: ''; position: absolute; top: -15%; right: -15%; width: 75%; height: 75%;
        background: linear-gradient(135deg, var(--brand), #8b5cf6, #00eeff); background-size: 200% 200%;
        border-radius: 50%; z-index: -1; filter: blur(10px); opacity: 0.9;
        animation: gradientShift 4s ease infinite alternate;
    }

    @keyframes gradientShift { 0% { background-position: 0% 50%; transform: translate(0,0) scale(1); } 100% { background-position: 100% 50%; transform: translate(-10px, 15px) scale(1.15); } }
    i[class^="ph"]:hover { transform: translateY(-4px) scale(1.05); }

    .btn i[class^="ph"], .badge i[class^="ph"], .side-buttons button i[class^="ph"], 
    h1 i[class^="ph"], h2 i[class^="ph"], h3 i[class^="ph"], .muted i[class^="ph"], 
    b i[class^="ph"], .drag-handle i[class^="ph"], table i[class^="ph"], 
    .toast i[class^="ph"], span i[class^="ph"], a i[class^="ph"] { 
        width: auto; height: auto; background: transparent; border: none; box-shadow: none;
        backdrop-filter: none; -webkit-backdrop-filter: none; border-radius: 0; color: inherit; display: inline-block; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.6));
    }
    
    .btn i[class^="ph"]::after, .badge i[class^="ph"]::after, .side-buttons button i[class^="ph"]::after, 
    h1 i[class^="ph"]::after, h2 i[class^="ph"]::after, h3 i[class^="ph"]::after, .muted i[class^="ph"]::after, 
    b i[class^="ph"]::after, .drag-handle i[class^="ph"]::after, table i[class^="ph"]::after, 
    .toast i[class^="ph"]::after, span i[class^="ph"]::after, a i[class^="ph"]::after { display: none; }

    .hidden { display: none !important; } 
    .app-shell { max-width: 1320px; margin: 0 auto; padding: 18px; width: 100%; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

    .glass, .table-wrap {
      background: var(--surface); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid var(--glass-border); border-top: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-soft), inset 0 0 20px rgba(255,255,255,0.02);
      margin-bottom: 16px; transition: transform 0.3s; color: var(--text);
    }
    .card, .summary { 
        background: var(--surface-solid); border-radius: var(--radius-md); padding: 16px; 
        border: 1px solid var(--glass-border); margin-bottom: 12px; color: var(--text); 
        box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
    }
    .card.solid { background: var(--surface-solid); }

    .neon-edge { border: var(--neon-border) !important; box-shadow: var(--shadow-glow) !important; }

    h1, h2, h3 { margin: 0; font-weight: 800; letter-spacing: -0.5px; }
    .title { font-size: clamp(30px, 5vw, 42px); line-height: 1; margin: 0; font-weight: 900; letter-spacing: -0.8px; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
    h2 { font-size: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text); }
    .muted { color: var(--muted); font-size: 13px; font-weight: 500; }
    
    .hero { position: relative; overflow: hidden; border-radius: var(--radius-lg); padding: 24px; color: white; background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), rgba(0, 0, 0, 0.6)); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 204, 0.3); box-shadow: var(--shadow-glow); margin-bottom: 18px; }
    .hero-inner { position: relative; z-index: 1; display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; flex-wrap:wrap; }
    .brand-row { display:flex; gap:12px; align-items:center; } 
    .logo-mark { display:grid; place-items:center; font-size: 32px; margin-right: 8px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; flex: 1 1 190px; }
    label { font-size: 11px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea { 
      width: 100%; padding: 14px 16px; border: 1px solid var(--glass-border); border-radius: var(--radius-sm); 
      background: rgba(0, 0, 0, 0.4); color: #fff; font-weight: 600; outline: none; transition: all 0.2s; 
      backdrop-filter: blur(10px);
    }
    input:focus, select:focus, textarea:focus { border-color: var(--brand); background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 4px rgba(0, 255, 204, 0.15); }
    
    .btn { 
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; 
      padding: 14px 20px; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--brand), var(--brand-dark)); 
      color: #000; font-weight: 800; font-size: 15px; border: none; cursor: pointer; 
      box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3); transition: all 0.2s;
    }
    .btn i[class^="ph"] { color: #000; filter: none; }
    .btn:active { transform: scale(0.97); }
    .btn:hover { box-shadow: 0 6px 20px rgba(0, 255, 204, 0.5); filter: brightness(1.1); }
    .btn.secondary { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); box-shadow: none; color: white; }
    .btn.secondary i[class^="ph"] { color: white; }
    .btn.danger { background: linear-gradient(135deg, #ff3366, #b91c45); box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3); color: white; }
    .btn.danger i[class^="ph"] { color: white; }
    .btn.warning { background: linear-gradient(135deg, #ffcc00, #d99a06); box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); color: #000; }
    .btn.warning i[class^="ph"] { color: #000; }
    .btn.blue { background: linear-gradient(135deg, #00eeff, #0088cc); color: #000; }
    .btn.small { padding: 8px 12px; font-size: 13px; border-radius: 10px; width: auto; }
    .btn.ghost { background: transparent; border: 1px solid var(--glass-border); box-shadow: none; color: var(--text); }
    .btn.ghost i[class^="ph"] { color: var(--text); }
    
    input[type=range] { padding: 0; border: none; background: transparent; height: 32px; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 4px; }
    input[type=range]::-webkit-slider-thumb { height: 20px; width: 20px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 10px var(--brand); cursor: pointer; -webkit-appearance: none; margin-top: -7px; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .between { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 12px; }
    
    /* NAVIGATION DRAWER CSS */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 10000; display: none; opacity: 0; transition: opacity 0.3s; }
    .drawer-overlay.open { display: block; opacity: 1; }
    .drawer { position: fixed; top: 0; left: -320px; width: 280px; height: 100vh; background: var(--surface-solid); border-right: 1px solid var(--glass-border); backdrop-filter: blur(40px); z-index: 10001; transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: var(--shadow-glow); }
    .drawer.open { left: 0; }
    .drawer-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .drawer-content { flex: 1; overflow-y: auto; padding: 20px; }
    
    .side-buttons { display: flex; flex-direction: column; gap: 7px; }
    .side-buttons button { width:100%; justify-content:flex-start; padding:14px 16px; border-radius: var(--radius-sm); background: transparent; color: var(--muted); font-weight:700; border:1px solid transparent; transition: all 0.2s; align-items: center; gap: 12px; display: flex; cursor: pointer; font-size: 15px;} 
    .side-buttons button i { font-size: 22px; color: var(--muted); filter: none; } 
    .side-buttons button:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); color: #fff; } 
    .side-buttons button.active { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color:#000; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3); border: none; }
    .side-buttons button.active i { color: #000; }
    .side-title { padding: 8px 10px 14px; font-weight:800; color:var(--text); letter-spacing: 0.5px; text-transform: uppercase; font-size: 12px; margin-top: 10px; }

    .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 13px; } 
    .summary { position:relative; overflow:hidden; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); } 
    .summary span { color:var(--muted); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; } 
    .summary b { font-size: 28px; display:block; color:var(--text); margin-top:5px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
    
    .table-wrap { overflow-x:auto; padding: 0; } 
    table.data-table { width:100%; border-collapse: collapse; min-width: 980px; background: transparent; } 
    table.data-table th, table.data-table td { border-bottom:1px solid rgba(255,255,255,0.1); padding: 14px 16px; text-align:left; font-size:13px; vertical-align:middle; color: var(--text); } 
    table.data-table th { background: rgba(0,0,0,0.3); color:var(--brand); position: sticky; top:0; z-index:1; font-weight:800; text-transform: uppercase; letter-spacing: 0.5px; } 
    table.data-table tr:hover td { background: rgba(255,255,255,0.05); }

    .modal { position: fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:2000; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-box { width:min(600px,100%); max-height:92vh; overflow:auto; background: var(--surface-solid); border: 1px solid var(--brand); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-glow); color: var(--text); }
    
    .badge { display:inline-flex; align-items:center; gap:5px; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 9px; box-shadow: 0 0 10px rgba(0,0,0,0.3); } 
    .badge.green { background: rgba(0, 255, 204, 0.2); color: #00ffcc; border: 1px solid rgba(0, 255, 204, 0.4); }
    .badge.pending, .badge.yellow { background: rgba(255, 204, 0, 0.2); color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.4); }
    .badge.danger { background: rgba(255, 51, 102, 0.2); color: #ff3366; border: 1px solid rgba(255, 51, 102, 0.4); }

    .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:rgba(0, 255, 204, 0.9); color:#000; padding:12px 24px; border-radius:999px; z-index:10000; font-weight:800; font-size: 14px; box-shadow:0 10px 30px rgba(0,255,204,0.5); transition: 0.3s; animation: slideUp 0.3s; }

    /* HOSPITAL CARD FULL WIDTH IMAGE OVERLAY */
    .hospital-card { position: relative; overflow: hidden; border-radius: var(--radius-md); padding: 0; border: 1px solid var(--glass-border); margin-bottom: 16px; }
    .hospital-card img, .hospital-card .placeholder-img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .hospital-card .placeholder-img { background: rgba(255,255,255,0.05); display: grid; place-items: center; }
    .hospital-card .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 10%, rgba(0,0,0,0.7) 60%, transparent); padding: 30px 16px 16px; display: flex; flex-direction: column; gap: 8px; }

    @media print { body * { visibility: hidden; } i[class^="ph"] { background: none !important; -webkit-text-fill-color: black !important; filter: none !important; color: black !important; } html, body { background: white !important; padding: 0 !important; margin: 0 !important; height: 100% !important; overflow: hidden !important; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; left: 0; top: 0; width: 100%; height: 100%; padding: 0; margin: 0; } .no-print { display: none !important; } @page { size: A4 portrait; margin: 0; } }
    @media (max-width: 640px) { .app-shell { padding: 12px; } .hero { border-radius: 28px; padding: 18px; } .hero-inner { flex-direction: column; align-items: stretch; } }
  </style>
</head>
<body>
  <div id="toast" class="toast hidden"></div>
  <div id="app" class="app-shell"></div>

  <div id="entryModal" class="modal hidden"></div>
  
  <div id="cropModal" class="modal hidden">
    <div class="modal-box" style="text-align:center;">
        <h2 style="justify-content:center;">Crop & Select</h2>
        <div style="max-height:50vh; overflow:hidden; margin-bottom:16px; border-radius:12px; border:1px solid var(--glass-border);">
            <img id="cropTarget" style="max-width:100%; display:block;">
        </div>
        <button class="btn green" onclick="performCrop()"><i class="ph ph-crop"></i> Confirm Crop</button>
        <button class="btn secondary" onclick="document.getElementById('cropModal').classList.add('hidden')">Cancel</button>
    </div>
  </div>

  <script>
    // ---------------------------------------------------------
    // FIREBASE CONFIGURATION & INITIALIZATION
    // ---------------------------------------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyCsz-hVR1pITcYwpM_jSlJ8dBMcPCHs9I4",
      authDomain: "greenlandwb101.firebaseapp.com",
      projectId: "greenlandwb101",
      storageBucket: "greenlandwb101.firebasestorage.app",
      messagingSenderId: "276942821312",
      appId: "1:276942821312:web:30f826cb26aba138401a25"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const LS = { uiState: 'greenland_ui_state_admin' };
    
    let localData = { hospitals: [], categories: [], entries: [], settings: {}, company: {}, vehicles: [], onboarding: {}, locations: {} };
    let zeroSpeedNotified = {};
    let unsubscribeRealtime = [];

    // SAMPLE MANIFEST STATE & SIGNATURES
    let sampleConfig = {
        month: new Date().getMonth() + 1,
        year: new Date().getFullYear(),
        days: [], 
        maxYellow: 5, maxRed: 5, maxBlue: 3, maxWhite: 2,
        time: "10:30 AM"
    };
    let sampleSignatures = {}; 

    function loadUIState() {
      const defaultState = { screen: 'login', role: 'admin', adminTab: 'overview', overviewTab: 'dashboard', adminSelectedVehicle: 'all', adminReportMonth: 'all', adminReportYear: new Date().getFullYear(), manifestSelection: {}, manifestAdjust: { x: 0, y: 0, spacing: 0 }, previewImage: null };
      try { const saved = JSON.parse(localStorage.getItem(LS.uiState)); if(saved) return { ...defaultState, ...saved }; } catch(e){} return defaultState;
    }
    let state = loadUIState();
    function saveUIState() { localStorage.setItem(LS.uiState, JSON.stringify(state)); }

    function uid(prefix='id'){ return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
    function todayISO(){ return new Date().toISOString().slice(0,10); }
    function monthName(m){ return new Date(2000, Number(m)-1, 1).toLocaleString('en', {month:'long'}); }
    
    function toast(msg, timeMs = 4000){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), timeMs); }

    // AUTHENTICATION LISTENER
    auth.onAuthStateChanged(user => {
        if (user) {
            setupRealtime();
            if(state.screen === 'login') { state.screen = 'admin'; }
            render();
        } else {
            clearRealtime();
            state.screen = 'login';
            render();
        }
    });

    function setupRealtime() {
      clearRealtime();
      unsubscribeRealtime.push(db.collection('core').doc('hospitals').onSnapshot(doc => { localData.hospitals = doc.data()?.data || []; render(); }));
      unsubscribeRealtime.push(db.collection('core').doc('categories').onSnapshot(doc => { localData.categories = doc.data()?.data || getDefaultCategories(); render(); }));
      unsubscribeRealtime.push(db.collection('core').doc('settings').onSnapshot(doc => { localData.settings = doc.data() || {}; applyTheme(); render(); }));
      unsubscribeRealtime.push(db.collection('core').doc('company').onSnapshot(doc => { localData.company = doc.data() || {}; render(); }));
      unsubscribeRealtime.push(db.collection('core').doc('vehicles').onSnapshot(doc => { localData.vehicles = doc.data()?.data || []; render(); }));
      unsubscribeRealtime.push(db.collection('live').doc('onboarding').onSnapshot(doc => { localData.onboarding = doc.data() || {}; render(); }));
      
      // TARGETED DOM UPDATE FOR SPEED (NO RENDER FUNCTION CALLED HERE)
      unsubscribeRealtime.push(db.collection('live').doc('locations').onSnapshot(doc => { 
          localData.locations = doc.data() || {}; 
          Object.keys(localData.locations).forEach(vNo => {
              const loc = localData.locations[vNo];
              
              if (loc && loc.speed === 0) {
                  if (!zeroSpeedNotified[vNo]) { toast(`ALERT: ${vNo} stationary at ${loc.time}`, 5000); zeroSpeedNotified[vNo] = true; }
              } else if (loc && loc.speed > 0) { 
                  zeroSpeedNotified[vNo] = false; 
              }

              const badgeElement = document.getElementById(`speed_badge_${vNo}`);
              const valElement = document.getElementById(`speed_val_${vNo}`);
              if (badgeElement && valElement) {
                  valElement.innerText = loc.speed;
                  badgeElement.className = `badge ${loc.speed > 0 ? 'green' : 'danger'}`;
              }

              const mapIframe = document.getElementById(`map_iframe_${vNo}`);
              const mapLink = document.getElementById(`map_link_${vNo}`);
              if (mapIframe && mapLink) {
                  const newIframeSrc = `https://www.openstreetmap.org/export/embed.html?bbox=${loc.lng-0.008},${loc.lat-0.008},${loc.lng+0.008},${loc.lat+0.008}&layer=mapnik&marker=${loc.lat},${loc.lng}`;
                  const newLinkHref = `https://maps.google.com/?q=${loc.lat},${loc.lng}`;
                  
                  if (mapIframe.src !== newIframeSrc) mapIframe.src = newIframeSrc;
                  if (mapLink.href !== newLinkHref) mapLink.href = newLinkHref;
              }
          });
      }));
      
      unsubscribeRealtime.push(db.collection('entries').onSnapshot(snapshot => {
         localData.entries = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
         if (state.screen === 'manifest' && state.previewImage) return;
         render();
      }));
    }

    function clearRealtime() {
        unsubscribeRealtime.forEach(unsub => unsub());
        unsubscribeRealtime = [];
    }

    function getDefaultCategories() {
      return [
        { id:'yellow', name:'Yellow', color:'#facc15', enabled:true, required:true, max:100 },
        { id:'red', name:'Red', color:'#ff3366', enabled:true, required:true, max:100 },
        { id:'blue', name:'Blue', color:'#00eeff', enabled:true, required:true, max:100 },
        { id:'white', name:'White', color:'#e5e7eb', enabled:true, required:true, max:100 },
        { id:'other', name:'Other', color:'#9ca3af', enabled:true, required:false, max:100 }
      ];
    }

    function settings(){ return Object.keys(localData.settings).length ? localData.settings : { title:'GreenLand', theme:'#00ffcc', dark:true, allowedWeights:[5,10], lockWeight:true }; }
    function hospitals(){ return localData.hospitals; }
    function categories(){ return localData.categories.length ? localData.categories : getDefaultCategories(); }
    function entries(){ return localData.entries; }
    function company(){ return Object.keys(localData.company).length ? localData.company : {companyName:'GreenLand', manifestTemplate:''}; }
    function vehicles(){ return localData.vehicles; }

    function updateCore(key, data) { db.collection('core').doc(key).set({data}, {merge: true}); }
    function updateSettings(data) { db.collection('core').doc('settings').set(data); }

    function readSampleSig(hid, type, input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                if(!sampleSignatures[hid]) sampleSignatures[hid] = {};
                sampleSignatures[hid][type] = e.target.result;
                render();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function downloadAllSampleManifests() {
        if(sampleConfig.days.length === 0) return alert("Please select at least one date from the calendar.");
        const c = company();
        if (!c.manifestTemplate) return alert("Upload a Blank Manifest Template in Settings first.");
        let activeHospitals = hospitals().filter(h => h.active !== false);
        if(!activeHospitals.length) return alert("No active hospitals available to generate manifest.");

        toast('Generating Sample Bulk PDF... Please wait.', 6000);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = doc.internal.pageSize.getWidth();
        const pdfHeight = doc.internal.pageSize.getHeight();
        const img = await loadImage(c.manifestTemplate);
        if(!img) return alert("Failed to load template image. Check template settings.");

        for (let i = 0; i < activeHospitals.length; i++) {
            const h = activeHospitals[i];
            const canvas = document.createElement('canvas');
            canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const scaleX = canvas.width / 1240;
            const scaleY = canvas.height / 1754;
            const gx = (state.manifestAdjust?.x || 0) * scaleX;
            const gy = (state.manifestAdjust?.y || 0) * scaleY;
            const rowStretch = (state.manifestAdjust?.spacing || 0) * scaleY;

            ctx.fillStyle = "#000000";
            ctx.font = `bold ${16 * scaleX}px Arial`;
            ctx.fillText(h.name || '', (240 * scaleX) + gx, (210 * scaleY) + gy);
            ctx.fillText(h.address || '', (160 * scaleX) + gx, (240 * scaleY) + gy);
            ctx.fillText(`${monthName(sampleConfig.month)} ${sampleConfig.year}`, (960 * scaleX) + gx, (210 * scaleY) + gy);

            const startY = (360 * scaleY) + gy;
            const rowH = (40 * scaleY) + rowStretch;

            let staffImg = null, driverImg = null;
            const sigs = sampleSignatures[h.id];
            if(sigs?.staff) staffImg = await loadImage(sigs.staff);
            if(sigs?.driver) driverImg = await loadImage(sigs.driver);

            for(let d=1; d<=31; d++) {
                if(!sampleConfig.days.includes(d)) continue;

                const y = startY + ((d-1) * rowH);

                const gen = (max) => Math.floor(Math.random() * (max + 1));
                const calcWeight = (c) => c > 0 ? (c * (Math.random() * 2 + 1)).toFixed(1) : 0;

                const yC = gen(sampleConfig.maxYellow); const yW = calcWeight(yC);
                const rC = gen(sampleConfig.maxRed);    const rW = calcWeight(rC);
                const bC = gen(sampleConfig.maxBlue);   const bW = calcWeight(bC);
                const wC = gen(sampleConfig.maxWhite);  const wW = calcWeight(wC);

                const totalBags = yC + rC + bC + wC;
                if(totalBags === 0) continue; 
                const totalWeight = (Number(yW) + Number(rW) + Number(bW) + Number(wW)).toFixed(1);

                const cols = [
                    { val: yC||'', cx: 130 }, { val: yW||'', cx: 190 },
                    { val: rC||'', cx: 250 }, { val: rW||'', cx: 310 },
                    { val: bC||'', cx: 370 }, { val: bW||'', cx: 430 },
                    { val: wC||'', cx: 490 }, { val: wW||'', cx: 550 },
                    { val: '', cx: 610 }, { val: '', cx: 670 },
                    { val: totalBags, cx: 730 }, { val: totalWeight, cx: 790 },
                    { val: sampleConfig.time, cx: 1010 }
                ];

                ctx.font = `bold ${13 * scaleX}px Arial`;
                cols.forEach(col => {
                    if(col.val !== '' && col.val !== 0 && col.val !== "0.0") {
                        const text = String(col.val);
                        const tWidth = ctx.measureText(text).width;
                        ctx.fillText(text, (col.cx * scaleX) + gx - (tWidth / 2), y);
                    }
                });

                if(staffImg) {
                    try { ctx.drawImage(staffImg, (830*scaleX)+gx, y-(15*scaleY), 100*scaleX, 20*scaleY); } catch(err){}
                }
                if(driverImg) {
                    try { ctx.drawImage(driverImg, (1070*scaleX)+gx, y-(15*scaleY), 100*scaleX, 20*scaleY); } catch(err){}
                }
            }

            ctx.font = `bold ${16 * scaleX}px Arial`;
            const footY1 = (1660 * scaleY) + gy; const footY2 = (1720 * scaleY) + gy;
            ctx.fillText(h.assignedVehicle || 'Sample_Vehicle', (180 * scaleX) + gx, footY1);
            ctx.fillText(c.driverName || 'Driver', (160 * scaleX) + gx, footY2);
            ctx.fillText(c.hodName || 'H.O.D', (940 * scaleX) + gx, footY2);

            if (i > 0) doc.addPage();
            doc.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, pdfWidth, pdfHeight);
        }

        try {
            doc.save(`Sample_Manifests_${monthName(sampleConfig.month)}_${sampleConfig.year}.pdf`);
            toast('Bulk Sample PDFs Downloaded Successfully!', 4000);
        } catch(err) {
            alert("PDF Save Error. Please try again.");
        }
    }

        const e = entries().find(x => x.id === id); if(!e) return;
        if (e.status === 'closed') {
             document.getElementById('entryModal').innerHTML = `<div class="modal-box"><div class="between" style="margin-bottom:16px;"><h2 style="margin:0; color:var(--danger);">${escapeHtml(e.hospitalName)} (CLOSED)</h2><button class="btn ghost icon small" onclick="document.getElementById('entryModal').classList.add('hidden')"><i class="ph ph-x"></i></button></div><p class="muted">This hospital was marked as closed on ${e.date} at ${e.time}.</p></div>`;
             document.getElementById('entryModal').classList.remove('hidden'); return;
        }
        const cats = categories().filter(c=>c.enabled);
        let bagsHtml = cats.map(c => { if(e.bags && e.bags[c.id]) { return `<div class="card solid" style="border-top:4px solid ${c.color}; text-align:center;"><b style="font-size:12px;">${c.name}</b><br><span style="font-size:20px;">${e.bags[c.id].count}</span><br><span class="muted">${e.bags[c.id].weight} kg</span></div>`; } return ''; }).join('');
        document.getElementById('entryModal').innerHTML = `<div class="modal-box"><div class="between" style="margin-bottom:16px;"><h2 style="margin:0">${escapeHtml(e.hospitalName)}</h2><button class="btn ghost icon small" onclick="document.getElementById('entryModal').classList.add('hidden')"><i class="ph ph-x"></i></button></div><p class="muted" style="font-size:14px; margin-top:0;"><i class="ph ph-clock"></i> Collected at: ${e.time}  |  <i class="ph ph-van"></i> Vehicle: ${e.vehicleNo||'N/A'}</p><div style="background:rgba(0,0,0,0.5); padding:12px; border-radius:14px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1);" class="between"><span>Total Bags: <b>${e.totalBags}</b></span><span>Total Weight: <b style="color:var(--brand); font-size:18px;">${e.totalWeight} kg</b></span></div><div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap:12px;">${bagsHtml}</div></div>`;
        document.getElementById('entryModal').classList.remove('hidden');
    }

    function adminOverview(){
      const selV = state.adminSelectedVehicle || 'all'; 
      const hs = hospitals().filter(h => selV === 'all' || h.assignedVehicle === selV); 
      const es = entries().filter(e => !e.deleted && (selV === 'all' || e.vehicleNo === selV)); 
      const today = es.filter(e=>e.date===todayISO());
      
      if (!state.overviewTab) state.overviewTab = 'dashboard';
      const tabs = [ { id: 'dashboard', label: 'Summary', icon: 'ph-squares-four' }, { id: 'location', label: 'Live Location', icon: 'ph-map-pin' }, { id: 'onboarding', label: 'Onboarding', icon: 'ph-user-focus' }, { id: 'route', label: 'Route Data', icon: 'ph-hospital' } ];

      let navHtml = `<div class="glass no-print" style="margin-bottom:16px; padding: 10px 12px; display:flex; gap:10px; overflow-x:auto;">`;
      tabs.forEach(t => { navHtml += `<button class="btn ${state.overviewTab === t.id ? '' : 'ghost'}" style="border-radius:14px; white-space:nowrap; padding: 8px 14px; flex-shrink:0;" onclick="state.overviewTab='${t.id}';render()"><i class="ph ${t.icon}"></i> ${t.label}</button>`; });
      navHtml += `</div>`;

      let contentHtml = '';
      if (state.overviewTab === 'dashboard') {
          contentHtml = `<div class="summary-grid" style="margin-bottom:16px;">${[['Total Hospitals',hs.length],['Submitted Today',today.length],['Pending Today',Math.max(0,hs.filter(h=>h.active!==false).length-today.length)],['Total Entries',es.length],['Bags Today',today.reduce((a,e)=>a+(e.totalBags||0),0)],['Weight Today',today.reduce((a,e)=>a+(e.totalWeight||0),0)+' kg']].map(x=>`<div class="summary card solid"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}</div><div class="glass neon-edge"><div class="section-head" style="margin-bottom:16px;"><div><h2 style="margin:0">Quick Actions</h2></div></div><div class="row"><button class="btn" onclick="state.adminTab='hospitals';render()"><i class="ph ph-plus"></i> Add Hospital</button><button class="btn blue" onclick="state.screen='reports';render()"><i class="ph ph-chart-bar"></i> View Reports</button><button class="btn secondary" onclick="exportBackup()"><i class="ph ph-download-simple"></i> Export Backup</button></div></div>`;
      } else {
          if (selV === 'all') { contentHtml = `<div class="glass" style="text-align:center; padding:60px 20px;"><div style="margin-bottom: 20px;"><i class="ph ph-funnel" style="font-size:48px; color:var(--muted);"></i></div><h3>Select a Vehicle</h3><p class="muted">Please select a specific vehicle from the <b>Global Filter</b> above.</p></div>`; } 
          else {
              if (state.overviewTab === 'location') { 
                  const loc = localData.locations?.[selV]; 
                  if(loc && loc.lat && loc.lng) { 
                      contentHtml = `<div class="glass"><div class="between" style="margin-bottom:16px;"><div><h2 style="margin:0;"><i class="ph ph-map-pin"></i> Live Location</h2></div><a id="map_link_${selV}" href="https://maps.google.com/?q=${loc.lat},${loc.lng}" target="_blank" class="btn blue">Open Maps</a></div>
                      <iframe id="map_iframe_${selV}" width="100%" height="400px" style="border-radius:18px; border:2px solid var(--brand); box-shadow: var(--shadow-glow);" frameborder="0" scrolling="no" src="https://www.openstreetmap.org/export/embed.html?bbox=${loc.lng-0.008},${loc.lat-0.008},${loc.lng+0.008},${loc.lat+0.008}&layer=mapnik&marker=${loc.lat},${loc.lng}"></iframe></div>`; 
                  } else { 
                      contentHtml = `<div class="glass" style="display:flex; align-items:center; flex-direction:column; gap:12px; padding:40px;"><i class="ph ph-map-pin-line" style="font-size:42px; color:var(--muted);"></i><div><h3>No live location data found</h3></div></div>`; 
                  } 
              } 
              else if (state.overviewTab === 'onboarding') { contentHtml = `<div class="glass"><h2 style="margin-bottom:16px;">Worker Onboarding (${selV})</h2>${renderOnboardingImages(selV)}</div>`; } 
              else if (state.overviewTab === 'route') { contentHtml = `<div class="glass"><h2 style="margin-bottom:16px;">Route Data (${selV})</h2>${renderRouteHospitals(selV)}</div>`; }
          }
      }
      return navHtml + contentHtml;
    }

    function adminVehicles() {
        const vs = vehicles();
        return `<div class="glass neon-edge" style="margin-bottom:16px;"><h2>Fleet Management</h2><div class="row" style="align-items:flex-end;"><div class="field"><label>Vehicle Number</label><input id="addVNum" placeholder="e.g. BR01XY1234" style="text-transform:uppercase;"></div><div class="field"><label>Driver Name</label><input id="addVDriver" placeholder="e.g. Raju"></div><div class="field"><label>Worker Phone</label><input id="addVPhone" type="tel" placeholder="e.g. 9876543210"></div><button class="btn" style="margin-bottom:12px;" onclick="addVehicle()"><i class="ph ph-plus"></i> Add Vehicle</button></div></div>
        <div class="glass"><h2>Added Vehicles</h2><div style="margin-top:16px;">${vs.length ? vs.map(v => `<div class="card solid" style="margin-bottom:12px"><div class="between"><div><b style="font-size:18px;"><i class="ph ph-van"></i> ${v.no}</b><br><span class="muted" style="font-size:13px;">Driver: ${v.driver || 'N/A'} | Worker: ${v.phone || 'N/A'}</span></div><div class="row">${v.phone ? `<a href="tel:${v.phone}" class="btn small blue"><i class="ph ph-phone"></i> Call</a>` : ''}<button class="btn small ${v.isDutyOn === false ? 'secondary' : 'green'}" onclick="toggleDuty('${v.no}', ${v.isDutyOn !== false})"><i class="ph ph-power"></i> ${v.isDutyOn === false ? 'Duty OFF' : 'Duty ON'}</button><button class="btn small danger" onclick="delVehicle('${v.no}')"><i class="ph ph-trash"></i> Delete</button></div></div></div>`).join('') : '<p class="muted">No vehicles added yet.</p>'}</div></div>`;
    }
    
    function toggleDuty(no, currentStatus) {
        const vs = vehicles(); const vehicle = vs.find(v => v.no === no);
        if(vehicle) { 
            vehicle.isDutyOn = !currentStatus; 
            if (vehicle.isDutyOn) { vehicle.dutyUpdatedAt = Date.now(); } 
            else { db.collection('live').doc('onboarding').update({ [no]: firebase.firestore.FieldValue.delete() }).catch(()=>{}); db.collection('live').doc('duty_calendars').update({ [no]: firebase.firestore.FieldValue.delete() }).catch(()=>{}); }
            updateCore('vehicles', vs); toast(`Duty set to ${vehicle.isDutyOn ? 'ON' : 'OFF'}`); render(); 
        }
    }

    function addVehicle() { let no = document.getElementById('addVNum').value.trim().toUpperCase(); let drv = document.getElementById('addVDriver').value.trim(); let phone = document.getElementById('addVPhone').value.trim(); if(!no) return alert("Required"); let vs = vehicles(); if(vs.some(v => v.no === no)) return alert("Exists"); vs.push({no, driver: drv, phone: phone, isDutyOn: true, dutyUpdatedAt: Date.now(), addedAt: new Date().toISOString()}); updateCore('vehicles', vs); toast("Added"); render(); }
    function delVehicle(no) { if(confirm(`Delete ${no}?`)){ updateCore('vehicles', vehicles().filter(v=>v.no!==no)); render(); } }

    let editHospitalId = null; let cropperInstance = null; let croppedBlob = null;
    
    function adminHospitals(){
      const selV = state.adminSelectedVehicle || 'all'; 
      let hs = hospitals().filter(h => selV === 'all' || h.assignedVehicle === selV); hs.sort((a,b) => (a.sortOrder || 0) - (b.sortOrder || 0));
      const vs = vehicles(); const vOpts = `<option value="">No Vehicle</option>` + vs.map(v => `<option value="${v.no}">${v.no}</option>`).join('');
      
      const enabledHs = hs.filter(h => h.active !== false);
      const disabledHs = hs.filter(h => h.active === false);

      function renderCard(h) {
          return `
            <div class="hospital-card" data-id="${h.id}">
                <div class="drag-handle" style="position:absolute; top:12px; left:12px; z-index:2; background:rgba(0,0,0,0.6); backdrop-filter:blur(5px); border-radius:8px; padding:6px; cursor:grab; color:white;"><i class="ph ph-dots-six-vertical"></i></div>
                ${h.active===false ? `<div style="position:absolute; top:12px; right:12px; z-index:2;" class="badge danger">DISABLED</div>` : ''}
                
                ${h.image ? `<img src="${h.image}">` : `<div class="placeholder-img"><i class="ph ph-hospital" style="font-size:64px; color:var(--muted);"></i></div>`}
                
                <div class="overlay">
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; gap:8px;">
                        <div style="flex:1;">
                            <b style="font-size:20px; color:white; text-shadow: 0 2px 5px rgba(0,0,0,0.8);">${escapeHtml(h.name)}</b><br>
                            <span style="font-size:13px; color:#ddd; font-weight:600;">${escapeHtml(h.address||'No Address')}</span>
                        </div>
                        <select style="max-width:130px; padding:6px 8px; font-size:12px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.2);" onchange="updateHospitalVehicle('${h.id}', this.value)">
                            ${vOpts.replace(`value="${h.assignedVehicle}"`, `value="${h.assignedVehicle}" selected`)}
                        </select>
                    </div>
                    <div class="row" style="margin-top:4px;">
                        <button class="btn small warning" onclick="editHospital('${h.id}')"><i class="ph ph-pencil"></i> Edit</button>
                        <button class="btn small ${h.active===false ? 'green' : 'secondary'}" onclick="toggleHospital('${h.id}')">${h.active===false?'<i class="ph ph-eye"></i> Enable':'<i class="ph ph-eye-slash"></i> Disable'}</button>
                        <button class="btn small danger" onclick="deleteHospital('${h.id}')"><i class="ph ph-trash"></i></button>
                    </div>
                </div>
            </div>`;
      }

      return `<div class="glass" style="margin-bottom:16px;">
        <h2>Hospital Management</h2>
        <div class="row" style="margin-top:16px">
            <div class="field"><label>Name</label><input id="hName" placeholder="Hospital name"></div>
            <div class="field"><label>Address</label><input id="hAddress" placeholder="Address"></div>
            <div class="field"><label>Assign Vehicle</label><select id="hVehicle">${vOpts}</select></div>
            <div class="field"><label>Image (Optional)</label><input type="file" accept="image/*" id="hImage" style="padding:8px" onchange="initCrop(this)"></div>
        </div>
        <button class="btn" id="addOrUpdateHospBtn" onclick="addHospital()"><i class="ph ph-plus-circle"></i> Add Hospital</button>
        ${editHospitalId ? `<button class="btn ghost" onclick="cancelEditHospital()">Cancel Edit</button>` : ''}
      </div>
      
      <div class="glass">
        <h2>Active Hospitals ${selV!=='all'?`(Filtered by ${selV})`:''}</h2>
        <p class="muted" style="margin-top: -10px; font-size:12px;"><i class="ph ph-info"></i> Drag using dots icon to re-arrange order.</p>
        <div id="sortable-hospitals" style="margin-top:16px; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
            ${enabledHs.length ? enabledHs.map(h => renderCard(h)).join('') : '<p class="muted">No active hospitals.</p>'}
        </div>
      </div>
      
      ${disabledHs.length ? `
      <div class="glass" style="opacity: 0.8;">
        <h2 style="color:var(--danger)">Disabled Hospitals</h2>
        <div style="margin-top:16px; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
            ${disabledHs.map(h => renderCard(h)).join('')}
        </div>
      </div>` : ''}`;
    }

    function initCrop(input) { if(input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { document.getElementById('cropTarget').src = e.target.result; document.getElementById('cropModal').classList.remove('hidden'); if(cropperInstance) cropperInstance.destroy(); cropperInstance = new Cropper(document.getElementById('cropTarget'), { aspectRatio: 16/9, viewMode: 1 }); }; reader.readAsDataURL(input.files[0]); } }
    function performCrop() { if(!cropperInstance) return; const canvas = cropperInstance.getCroppedCanvas(); canvas.toBlob(blob => { croppedBlob = blob; document.getElementById('cropModal').classList.add('hidden'); toast('Image cropped! Ready to upload.'); }, 'image/jpeg', 0.4); }

    function editHospital(id) { const h = hospitals().find(x=>x.id===id); if(!h) return; editHospitalId = id; document.getElementById('hName').value = h.name || ''; document.getElementById('hAddress').value = h.address || ''; document.getElementById('hVehicle').value = h.assignedVehicle || ''; document.getElementById('addOrUpdateHospBtn').innerHTML = '<i class="ph ph-check-circle"></i> Update Hospital'; window.scrollTo({top: 0, behavior: 'smooth'}); render(); }
    function cancelEditHospital() { editHospitalId = null; croppedBlob = null; render(); }
    function addHospital(){ const name=document.getElementById('hName').value.trim(); if(!name) return alert('Name required'); const address=document.getElementById('hAddress').value.trim(); const assignedVehicle = document.getElementById('hVehicle').value.trim().toUpperCase(); if(croppedBlob) { const file = new File([croppedBlob], "compressed_img.jpg", { type: "image/jpeg" }); processAndUploadImage({files: [file]}, 'hospitals', img => finishAddEditHospital(name, address, assignedVehicle, img)); } else { finishAddEditHospital(name, address, assignedVehicle, null); } }
    function finishAddEditHospital(name, address, assignedVehicle, img) { const hs = hospitals(); if(editHospitalId) { const idx = hs.findIndex(x=>x.id===editHospitalId); if(idx > -1) { hs[idx].name = name; hs[idx].address = address; hs[idx].assignedVehicle = assignedVehicle; if(img) hs[idx].image = img; } editHospitalId = null; toast('Hospital Updated'); } else { if(hs.some(h=>h.name.toLowerCase()===name.toLowerCase())) return alert('Duplicate Name'); hs.push({id:uid('h'), name, address, assignedVehicle, image:img||'', active:true, createdAt:new Date().toISOString(), sortOrder: hs.length}); toast('Hospital Added'); } croppedBlob = null; updateCore('hospitals', hs); render(); }

    function initSortable() { const el = document.getElementById('sortable-hospitals'); if(el) { Sortable.create(el, { handle: '.drag-handle', animation: 150, onEnd: function() { const newOrderIds = [...el.children].map(c => c.getAttribute('data-id')); const hs = hospitals(); newOrderIds.forEach((id, index) => { const h = hs.find(x => x.id === id); if(h) h.sortOrder = index; }); updateCore('hospitals', hs); } }); } }
    function updateHospitalVehicle(id, vNo) { const hs = hospitals(); const h = hs.find(x => x.id === id); if(h) { h.assignedVehicle = vNo.trim().toUpperCase(); updateCore('hospitals', hs); toast('Vehicle Saved'); } }
    function toggleHospital(id){ const hs=hospitals(); const h=hs.find(x=>x.id===id); h.active=h.active===false; updateCore('hospitals', hs); render(); }
    function deleteHospital(id){ if(!confirm('Delete?')) return; updateCore('hospitals', hospitals().filter(h=>h.id!==id)); render(); }

    function adminBags(){ const cats=categories(); return `<div class="glass"><h2>Bag Categories</h2>${cats.map(c=>`<div class="card solid" style="margin-bottom:16px"><div class="row"><div class="field"><label>Name</label><input value="${escapeAttr(c.name)}" onchange="updateCat('${c.id}','name',this.value)"></div><div class="field" style="flex:0"><label>Color</label><input type="color" style="padding:2px; height:42px; background:transparent; border:none;" value="${c.color}" onchange="updateCat('${c.id}','color',this.value)"></div><div class="field"><label>Max Count</label><input type="number" value="${c.max}" onchange="updateCat('${c.id}','max',this.value)"></div><div class="row" style="margin-top:16px;"><input type="checkbox" ${c.enabled?'checked':''} onchange="updateCat('${c.id}','enabled',this.checked)"> <label>Enabled</label></div><div class="row" style="margin-top:16px;"><input type="checkbox" ${c.required?'checked':''} onchange="updateCat('${c.id}','required',this.checked)"> <label>Required</label></div></div></div>`).join('')}</div>`; }
    function updateCat(id,k,v){ const cs=categories(); const c=cs.find(x=>x.id===id); c[k]=v; updateCore('categories', cs); }
    function adminWeights(){ const s=settings(); return `<div class="glass"><h2>Weight Settings</h2><div class="field" style="max-width:400px; margin-bottom:20px;"><label>Allowed weights (comma separated)</label><input value="${(s.allowedWeights||[5,10]).join(',')}" onchange="saveSetting('allowedWeights',this.value.split(',').map(Number).filter(Boolean))"></div><div class="row"><input type="checkbox" ${s.lockWeight?'checked':''} onchange="saveSetting('lockWeight',this.checked)"> <label>Lock weight after submit</label></div></div>`; }
    function exportBackup(){ const data={hospitals:hospitals(),categories:categories(),entries:entries(),settings:settings(),company:company(), vehicles:vehicles()}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='greenland_backup.json'; a.click(); toast('Backup Exported'); }
    function adminCompany(){ const c=company(); return `<div class="glass"><h2>Template & Print Info</h2><div class="field" style="margin-bottom:20px;"><label>Blank Manifest Template (A4 Image)</label><input type="file" accept="image/*" style="padding:12px;" onchange="uploadCompanyImage('manifestTemplate', this)">${c.manifestTemplate ? `<img src="${c.manifestTemplate}" style="max-height:100px; margin-top:10px; border:1px solid var(--glass-border); border-radius: 8px;">` : ''}</div><div class="summary-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:20px;">${['companyName','driverName','hodName'].map(k=>`<div class="field"><label>${k}</label><input value="${escapeAttr(c[k]||'')}" onchange="saveCompany('${k}',this.value)"></div>`).join('')}</div></div>`; }
    function saveCompany(k,v){ const c=company(); c[k]=v; updateCompany(c); toast('Saved'); }
    function uploadCompanyImage(k,input){ if(input.files && input.files[0]) { processAndUploadImage(input, 'templates', img => { const c=company(); c[k]=img; updateCompany(c); }); } }
    function adminSettings(){ const s=settings(); return `<div class="glass"><h2>Global Settings</h2><div class="row" style="margin-bottom:20px;"><div class="field"><label>App Title</label><input value="${escapeAttr(s.title || 'GreenLand Pro')}" onchange="saveSetting('title',this.value)"></div><div class="field"><label>Brand Color</label><input type="color" style="height:42px; padding:2px; border:none; background:transparent;" value="${s.theme || '#00ffcc'}" onchange="saveSetting('theme',this.value)"></div></div><div class="field" style="gap:16px;"><div class="row"><input type="checkbox" ${s.requireSignatures?'checked':''} onchange="saveSetting('requireSignatures',this.checked)"> <label>Require signatures</label></div></div></div>`; }
    function saveSetting(k,v){ const s=settings(); s[k]=v; updateSettings(s); applyTheme(); }
    
    function adminSecurity(){ return `<div class="glass"><h2>System Reset Options</h2><p class="muted">Manage and clear specific database collections safely.</p><div class="summary-grid" style="margin-top:16px; gap: 16px;"><button class="btn warning" onclick="resetSpecific('entries')"><i class="ph ph-files"></i> Clear All Reports</button><button class="btn warning" onclick="resetSpecific('onboarding')"><i class="ph ph-users"></i> Clear Onboarding Data</button><button class="btn secondary" onclick="resetSpecific('locations')"><i class="ph ph-map-pin"></i> Clear Live Locations</button></div><div style="margin-top:24px; padding-top:24px; border-top:1px solid var(--glass-border);"><h2 style="color:var(--danger)"><i class="ph ph-warning-octagon"></i> Danger Zone</h2><p class="muted">This will erase ALL core data including hospitals, vehicles, and settings.</p><button class="btn danger" style="margin-top:12px; background:#000; border: 1px solid var(--danger);" onclick="factoryReset()"><i class="ph ph-trash"></i> FULL FACTORY RESET</button></div></div>`; }
    function resetSpecific(type) { if(prompt(`Type YES to clear all ${type} data`) === 'YES') { toast(`Clearing ${type}...`); if(type === 'entries') { db.collection('entries').get().then(snap => { const batch = db.batch(); snap.docs.forEach(doc => batch.delete(doc.ref)); batch.commit().then(() => toast('All Reports/Entries Cleared successfully')); }); } else { db.collection('live').doc(type).delete().then(() => toast(`${type} Cleared successfully`)); } } }
    function factoryReset() { if(prompt('Type DELETE to wipe ALL database collections completely') === 'DELETE') { toast('Wiping Firebase Data...'); ['hospitals','categories','settings','company','vehicles'].forEach(k => db.collection('core').doc(k).delete()); ['onboarding','locations','duty_calendars'].forEach(k => db.collection('live').doc(k).delete()); db.collection('entries').get().then(snap => { const batch = db.batch(); snap.docs.forEach(doc => batch.delete(doc.ref)); batch.commit(); }); localStorage.clear(); setTimeout(() => location.reload(), 2000); } }

    function reportsHTML(inAdmin=false){
      const cats = categories().filter(c=>c.enabled); const selMonth = state.adminReportMonth || 'all'; const selYear = state.adminReportYear || new Date().getFullYear(); const selV = state.adminSelectedVehicle || 'all';
      let es = entries().filter(e=>!e.deleted); if(selV !== 'all') { es = es.filter(e => e.vehicleNo === selV); } if(selMonth !== 'all') { es = es.filter(e => Number(e.month) === Number(selMonth) && Number(e.year) === Number(selYear)); }
      let mOpts = `<option value="all">All Time</option>`; for(let i=1; i<=12; i++) { mOpts += `<option value="${i}" ${Number(selMonth)===i?'selected':''}>${monthName(i)}</option>`; }
      
      return `${inAdmin?'':`<div class="hero no-print neon-edge" style="padding:18px"><div class="hero-inner"><div><div class="brand-row"><div class="logo-mark"><i class="ph-fill ph-chart-bar"></i></div><div><h1 class="title" style="font-size:32px">Reports</h1><p class="muted" style="margin-top:4px;">All Submission Logs</p></div></div></div><div class="top-actions"><button class="btn secondary" onclick="go('admin')"><i class="ph ph-arrow-left"></i> Back</button></div></div></div>`}
      <div class="glass section no-print"><div class="between" style="margin-bottom: 20px;"><div class="row"><input type="text" id="reportSearch" placeholder="Search data..." style="max-width:200px;" oninput="filterReportRows(this.value)"><select style="max-width:140px; padding:11px 12px;" onchange="state.adminReportMonth=this.value;render()">${mOpts}</select><input type="number" style="max-width:90px; padding:11px 12px;" value="${selYear}" onchange="state.adminReportYear=this.value;render()"></div><div class="row"><button class="btn blue" onclick="go('manifest')"><i class="ph ph-printer"></i> Print Manifest</button></div></div><div class="table-wrap"><table id="reportTable" class="data-table"><tr><th>Date / Time</th><th>Hospital (Vehicle)</th>${cats.map(c=>`<th>${c.name}</th>`).join('')}<th>Total</th><th>Action</th></tr>
      ${es.map(e => {
          if (e.status === 'closed') { return `<tr><td><b style="font-weight:800;">${e.date}</b><br><span class="muted" style="font-size:12px;">${e.time}</span></td><td style="font-weight:700;">${escapeHtml(e.hospitalName)}<br><span style="font-size:11px; color:var(--brand);">${e.vehicleNo||'N/A'}</span></td><td colspan="${cats.length + 1}" style="text-align:center; color:var(--danger); font-weight:800; letter-spacing:1px;">HOSPITAL CLOSED</td><td><button class="btn small secondary" onclick="viewEntryDetails('${e.id}')"><i class="ph ph-eye"></i></button> <button class="btn small danger" onclick="deleteEntry('${e.id}')"><i class="ph ph-trash"></i></button></td></tr>`; }
          return `<tr><td><b style="font-weight:800;">${e.date}</b><br><span class="muted" style="font-size:12px;">${e.time}</span></td><td style="font-weight:700;">${escapeHtml(e.hospitalName)}<br><span style="font-size:11px; color:var(--brand);">${e.vehicleNo||'N/A'}</span></td>${cats.map(c=>`<td>${e.bags?.[c.id]?.count??0} b <br><span style="font-size:12px;" class="muted">${e.bags?.[c.id]?.weight??0} kg</span></td>`).join('')}<td><b style="font-size:15px;">${e.totalBags||0}</b><br><span style="color:var(--brand);font-size:12px;font-weight:800;">${e.totalWeight||0} kg</span></td><td><button class="btn small secondary" onclick="viewEntryDetails('${e.id}')"><i class="ph ph-eye"></i></button> <button class="btn small danger" onclick="deleteEntry('${e.id}')"><i class="ph ph-trash"></i></button></td></tr>`;
      }).reverse().join('') || '<tr><td colspan="10" style="text-align:center; padding: 40px 16px;" class="muted">No entries recorded yet</td></tr>'}</table></div></div>`;
    }
    
    function filterReportRows(query){ query = (query || '').toLowerCase(); const table = document.getElementById('reportTable'); if(!table) return; [...table.querySelectorAll('tr')].slice(1).forEach(row=>{ row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none'; }); }
    function deleteEntry(id){ if(confirm('Delete entry? from Database?')){ db.collection('entries').doc(id).update({deleted: true}).then(()=>toast('Deleted from Cloud')); } }

    let previewTimer;
    function debounceGeneratePreview() { clearTimeout(previewTimer); previewTimer = setTimeout(() => { const sel = state.manifestSelection || {}; const now = new Date(); generateManifestPreview(sel.hospitalId || hospitals()[0]?.id, sel.month || now.getMonth()+1, sel.year || now.getFullYear(), true); }, 50); }

    function manifestHTML(){
      if (state.previewImage) {
         return `<div class="hero no-print neon-edge" style="padding:18px"><div class="hero-inner"><div><div class="brand-row"><div class="logo-mark"><i class="ph-fill ph-file-pdf"></i></div><div><h1 class="title" style="font-size:32px">Manifest Preview</h1><p class="muted" style="margin-top:4px;">Adjust & Save as PDF</p></div></div></div></div></div>
         <div class="glass neon-edge no-print" style="margin-bottom:20px;"><div class="between" style="margin-bottom:16px;"><h3 style="margin:0;"><i class="ph ph-sliders"></i> Alignment Options</h3><div class="row"><button class="btn secondary" onclick="state.previewImage=null; render();"><i class="ph ph-arrow-left"></i> Discard</button><button class="btn danger" onclick="downloadManifestPDF()"><i class="ph ph-download-simple"></i> Save as PDF</button></div></div>
           <div class="row" style="gap:24px; flex-wrap:wrap;"><div class="field" style="flex:1; min-width:200px;"><label>Global X Shift: <span id="valX">${state.manifestAdjust.x}</span></label><input type="range" min="-300" max="300" value="${state.manifestAdjust.x}" oninput="document.getElementById('valX').innerText=this.value; state.manifestAdjust.x=Number(this.value); debounceGeneratePreview();"></div><div class="field" style="flex:1; min-width:200px;"><label>Global Y Shift: <span id="valY">${state.manifestAdjust.y}</span></label><input type="range" min="-300" max="300" value="${state.manifestAdjust.y}" oninput="document.getElementById('valY').innerText=this.value; state.manifestAdjust.y=Number(this.value); debounceGeneratePreview();"></div><div class="field" style="flex:1; min-width:200px;"><label>Row Spacing: <span id="valS">${state.manifestAdjust.spacing}</span></label><input type="range" min="-10" max="10" step="0.2" value="${state.manifestAdjust.spacing}" oninput="document.getElementById('valS').innerText=this.value; state.manifestAdjust.spacing=Number(this.value); debounceGeneratePreview();"></div></div></div>
         <div style="text-align:center; background:#fff; padding:2px; border-radius:18px; box-shadow:var(--shadow-soft); border: 2px solid var(--glass-border);"><img id="manifestPreviewImg" src="${state.previewImage}" style="max-width:100%; border-radius:16px;"></div>`;
      }

      const hs = hospitals(); const now = new Date(); const sel = state.manifestSelection || {}; const hid = sel.hospitalId || hs[0]?.id || ''; const month = Number(sel.month || now.getMonth()+1); const year = Number(sel.year || now.getFullYear()); 
      if (!hospitals().find(x=>x.id===hid) && hs.length === 0) return `<div class="glass" style="text-align:center; padding:40px;"><h3>No Hospitals Found</h3><p class="muted">Please add a hospital first to generate a manifest.</p></div>`;
      
      const controls = `<div class="glass no-print" style="margin-bottom: 24px;"><div class="row" style="margin-bottom: 20px;"><div class="field"><label>Hospital</label><select onchange="state.manifestSelection.hospitalId=this.value;render()">${hs.map(x=>`<option value="${x.id}" ${x.id===hid?'selected':''}>${escapeHtml(x.name)}</option>`).join('')}</select></div><div class="field"><label>Month</label><select onchange="state.manifestSelection.month=this.value;render()">${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${i+1===month?'selected':''}>${monthName(i+1)}</option>`).join('')}</select></div><div class="field"><label>Year</label><input type="number" value="${year}" onchange="state.manifestSelection.year=this.value;render()"></div></div>
      <div style="border-top: 1px solid var(--glass-border); padding-top: 16px; margin-top: 8px;"><button class="btn warning" onclick="downloadAllManifestsPDF()"><i class="ph ph-files"></i> Generate ALL Manifests as PDF</button> <span class="muted" style="margin-left:8px; font-size:12px;">This will merge all active hospitals into a single PDF for the selected month.</span></div></div>`;
      
      return `<div class="hero no-print neon-edge" style="padding:18px"><div class="hero-inner"><div><div class="brand-row"><div class="logo-mark"><i class="ph-fill ph-printer"></i></div><div><h1 class="title" style="font-size:32px">Create Manifest</h1><p class="muted" style="margin-top:4px;">Auto-Map data onto your Template</p></div></div></div><div class="top-actions"><button class="btn secondary" onclick="go('reports')"><i class="ph ph-arrow-left"></i> Back</button> <button class="btn blue" onclick="generateManifestPreview('${hid}', ${month}, ${year})"><i class="ph ph-play"></i> Generate Preview</button></div></div></div>${controls}
      <div class="glass" style="text-align:center; padding:40px;">${company().manifestTemplate ? `<h3><i class="ph ph-check-circle" style="color:var(--brand); font-size:32px; display:block; margin-bottom:12px;"></i> Template Ready</h3><p class="muted">Click "Generate Preview" to map data.</p>` : `<h3 style="color:var(--danger)">No Manifest Template Found</h3><p class="muted">Upload the Blank Manifest Image in Settings.</p>`}</div>`; 
    }
    
    function loadImage(src) { return new Promise((resolve) => { const img = new Image(); img.crossOrigin = "Anonymous"; img.onload = () => resolve(img); img.onerror = () => resolve(null); img.src = src; }); }

    async function downloadAllManifestsPDF() {
        const c = company(); if (!c.manifestTemplate) return alert("Upload a Blank Manifest Template in Settings first.");
        const sel = state.manifestSelection || {}; const now = new Date();
        const month = Number(sel.month || now.getMonth() + 1); const year = Number(sel.year || now.getFullYear());
        let activeHospitals = hospitals().filter(h => h.active !== false);
        if(!activeHospitals.length) return alert("No active hospitals available.");

        toast('Generating Bulk PDF... Please wait.', 6000);
        const { jsPDF } = window.jspdf; const doc = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = doc.internal.pageSize.getWidth(); const pdfHeight = doc.internal.pageSize.getHeight();
        const img = await loadImage(c.manifestTemplate);
        if(!img) return alert("Failed to load template image.");

        const allEntries = entries().filter(e => !e.deleted && Number(e.month) === Number(month) && Number(e.year) === Number(year));

        for (let i = 0; i < activeHospitals.length; i++) {
            const h = activeHospitals[i];
            const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height; 
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const scaleX = canvas.width / 1240; const scaleY = canvas.height / 1754;
            const gx = (state.manifestAdjust?.x || 0) * scaleX; const gy = (state.manifestAdjust?.y || 0) * scaleY; const rowStretch = (state.manifestAdjust?.spacing || 0) * scaleY;

            ctx.fillStyle = "#000000"; ctx.font = `bold ${16 * scaleX}px Arial`;
            ctx.fillText(h.name || '', (240 * scaleX) + gx, (210 * scaleY) + gy); ctx.fillText(h.address || '', (160 * scaleX) + gx, (240 * scaleY) + gy); ctx.fillText(`${monthName(month)} ${year}`, (960 * scaleX) + gx, (210 * scaleY) + gy);
            
            const es = allEntries.filter(e => e.hospitalId === h.id); const byDay = {}; es.forEach(e => byDay[e.day] = e);
            const startY = (360 * scaleY) + gy; const rowH = (40 * scaleY) + rowStretch; let lastVehicle = '';

            for(let d=1; d<=31; d++) {
                const e = byDay[d]; const y = startY + ((d-1) * rowH);
                if(e) {
                    if(e.vehicleNo) lastVehicle = e.vehicleNo; 
                    if(e.status === 'closed') {
                        ctx.fillStyle = "red"; ctx.font = `bold ${14 * scaleX}px Arial`; 
                        const text = "HOSPITAL CLOSED"; const tWidth = ctx.measureText(text).width;
                        ctx.fillText(text, (450 * scaleX) + gx - (tWidth / 2), y); ctx.fillStyle = "#000000"; 
                    } else {
                        const b = e.bags || {};
                        const cols = [ { val: b.yellow?.count, cx: 130 }, { val: b.yellow?.weight, cx: 190 }, { val: b.red?.count, cx: 250 }, { val: b.red?.weight, cx: 310 }, { val: b.blue?.count, cx: 370 }, { val: b.blue?.weight, cx: 430 }, { val: b.white?.count, cx: 490 }, { val: b.white?.weight, cx: 550 }, { val: b.other?.count, cx: 610 }, { val: b.other?.weight, cx: 670 }, { val: e.totalBags, cx: 730 }, { val: e.totalWeight, cx: 790 }, { val: e.time, cx: 1010 } ];
                        ctx.font = `bold ${13 * scaleX}px Arial`;
                        cols.forEach(col => { if(col.val !== undefined && col.val !== '') { const text = String(col.val); const tWidth = ctx.measureText(text).width; ctx.fillText(text, (col.cx * scaleX) + gx - (tWidth / 2), y); } });
                        if(e.signatures?.staff) { const sImg = await loadImage(e.signatures.staff); if (sImg) ctx.drawImage(sImg, (830*scaleX)+gx, y-(15*scaleY), 100*scaleX, 20*scaleY); }
                        if(e.signatures?.driver) { const dImg = await loadImage(e.signatures.driver); if (dImg) ctx.drawImage(dImg, (1070*scaleX)+gx, y-(15*scaleY), 100*scaleX, 20*scaleY); }
                    }
                }
            }
            ctx.font = `bold ${16 * scaleX}px Arial`; ctx.fillText(lastVehicle, (180 * scaleX) + gx, (1660 * scaleY) + gy); ctx.fillText(c.driverName || 'Driver', (160 * scaleX) + gx, (1720 * scaleY) + gy); ctx.fillText(c.hodName || 'H.O.D', (940 * scaleX) + gx, (1720 * scaleY) + gy);
            if (i > 0) doc.addPage();
            doc.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, pdfWidth, pdfHeight);
        }
        try { doc.save(`All_Manifests_${monthName(month)}_${year}.pdf`); toast('Bulk PDF Downloaded!', 3000); } catch(err) { alert("PDF Save Error."); }
    }

    function generateManifestPreview(hid, month, year, isSliderUpdate = false) {
        const c = company(); if (!c.manifestTemplate) return alert("Upload a Blank Manifest Template.");
        const h = hospitals().find(x=>x.id===hid); if(!h) return alert("Hospital not found");
        const es = entries().filter(e=>!e.deleted && e.hospitalId===hid && Number(e.month)===Number(month) && Number(e.year)===Number(year));
        const byDay = {}; es.forEach(e => byDay[e.day] = e);
        const img = new Image(); img.crossOrigin = "Anonymous";
        img.onload = () => {
            const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height; 
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const scaleX = canvas.width / 1240; const scaleY = canvas.height / 1754;
            const gx = (state.manifestAdjust?.x || 0) * scaleX; const gy = (state.manifestAdjust?.y || 0) * scaleY; const rowStretch = (state.manifestAdjust?.spacing || 0) * scaleY;

            ctx.fillStyle = "#000000"; ctx.font = `bold ${16 * scaleX}px Arial`;
            ctx.fillText(h.name || '', (240 * scaleX) + gx, (210 * scaleY) + gy); ctx.fillText(h.address || '', (160 * scaleX) + gx, (240 * scaleY) + gy); ctx.fillText(`${monthName(month)} ${year}`, (960 * scaleX) + gx, (210 * scaleY) + gy);
            
            const startY = (360 * scaleY) + gy; const rowH = (40 * scaleY) + rowStretch; let lastVehicle = '';

            for(let d=1; d<=31; d++) {
                const e = byDay[d]; const y = startY + ((d-1) * rowH);
                if(e) {
                    if(e.vehicleNo) lastVehicle = e.vehicleNo; 
                    if(e.status === 'closed') {
                        ctx.fillStyle = "red"; ctx.font = `bold ${14 * scaleX}px Arial`; const text = "HOSPITAL CLOSED"; const textWidth = ctx.measureText(text).width;
                        const centerX = (450 * scaleX) + gx - (textWidth / 2); ctx.fillText(text, centerX, y); ctx.fillStyle = "#000000"; 
                    } else {
                        const b = e.bags || {};
                        const cols = [ { val: b.yellow?.count, cx: 130 }, { val: b.yellow?.weight, cx: 190 }, { val: b.red?.count, cx: 250 }, { val: b.red?.weight, cx: 310 }, { val: b.blue?.count, cx: 370 }, { val: b.blue?.weight, cx: 430 }, { val: b.white?.count, cx: 490 }, { val: b.white?.weight, cx: 550 }, { val: b.other?.count, cx: 610 }, { val: b.other?.weight, cx: 670 }, { val: e.totalBags, cx: 730 }, { val: e.totalWeight, cx: 790 }, { val: e.time, cx: 1010 } ];
                        ctx.font = `bold ${13 * scaleX}px Arial`;
                        cols.forEach(col => { if(col.val !== undefined && col.val !== '') { const text = String(col.val); const tWidth = ctx.measureText(text).width; const tX = (col.cx * scaleX) + gx - (tWidth / 2); ctx.fillText(text, tX, y); } });
                        if(e.signatures?.staff) { const sImg = new Image(); sImg.crossOrigin="Anonymous"; sImg.src = e.signatures.staff; try { ctx.drawImage(sImg, (830*scaleX)+gx, y-(15*scaleY), 100*scaleX, 20*scaleY); }catch(err){} }
                        if(e.signatures?.driver) { const dImg = new Image(); dImg.crossOrigin="Anonymous"; dImg.src = e.signatures.driver; try { ctx.drawImage(dImg, (1070*scaleX)+gx, y-(15*scaleY), 100*scaleX, 20*scaleY); }catch(err){} }
                    }
                }
            }
            ctx.font = `bold ${16 * scaleX}px Arial`; const footY1 = (1660 * scaleY) + gy; const footY2 = (1720 * scaleY) + gy;
            ctx.fillText(lastVehicle, (180 * scaleX) + gx, footY1); ctx.fillText(c.driverName || 'Driver', (160 * scaleX) + gx, footY2); ctx.fillText(c.hodName || 'H.O.D', (940 * scaleX) + gx, footY2);
            
            try { 
                state.previewImage = canvas.toDataURL('image/jpeg', 0.9); 
                if (isSliderUpdate) { const imgEl = document.getElementById('manifestPreviewImg'); if (imgEl) imgEl.src = state.previewImage; } else { render(); }
            } catch(err) { alert('CORS Issue.'); }
        }; img.src = c.manifestTemplate;
    }

    function downloadManifestPDF() { if (!state.previewImage) return alert("No preview."); try { const { jsPDF } = window.jspdf; const doc = new jsPDF('p', 'mm', 'a4'); doc.addImage(state.previewImage, 'JPEG', 0, 0, doc.internal.pageSize.getWidth(), doc.internal.pageSize.getHeight()); doc.save(`Manifest_${Date.now()}.pdf`); toast('PDF Downloaded!'); } catch(err) { alert("PDF Error."); } }
    
    // START
    init();
  </script>
</body>
</html>
